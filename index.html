    /* ============================== PERSISTENCE HOOK (FIXED & CLEAN) ============================== */
    function usePersisted(key, initial) {
      const [value, setValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initial;
        } catch (e) {
          return initial;
        }
      });
      const [loaded] = useState(true);

      useEffect(() => {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {
          console.error("Storage save failed for", key, e);
        }
      }, [key, value]);

      return [value, setValue, loaded];
    }

    function todayStr() {
      return new Date().toISOString().slice(0, 10);

        const nextQuestions = [

    /* ============================== AI MENTOR (SMART CONFIG + FALLBACK) ============================== */
    const MENTOR_SYSTEM_PROMPT = `You are "AI Mentor", the in-app assistant for AI Path Telangana — a platform helping Telangana and Indian students become AI engineers. Tone: warm, direct, encouraging, never condescending. Students range from complete beginners to final-year engineering students, so calibrate your explanations to what they ask. You help with: roadmap guidance (what to learn next), explaining ML/DL/GenAI concepts clearly, resume feedback, project suggestions, interview prep, and general "am I on track" reassurance. Keep answers focused and practical — prefer a clear next step over a long lecture. Never make a student feel silly for asking something basic.`;
    const MENTOR_STARTERS = [
      "I'm in 1st year CSE, what should I learn first?",
      "What's the difference between ML and Deep Learning?",
      "Review my project idea: a resume screener",
      "What does an AI Engineer actually do day to day?",

    function MentorPage({ onUserQuestion }) {
      const [messages, setMessages] = useState([

      const simulateMentorResponse = (q) => {

        }

        // 6. Maths & Statistics
        if (lower.includes("math") || lower.includes("statistics") || lower.includes("probability") || lower.includes("linear algebra") || lower.includes("calculus")) {
          return "📐 **How much Maths do you actually need for AI?**\n\nYou do **not** need a PhD in pure mathematics. You need intuition across 4 pillars:\n1. **Linear Algebra**: Vectors, matrices, dot products, and matrix multiplication (how neural networks transform data and calculate similarity).\n2. **Calculus**: Partial derivatives and the **Chain Rule** (this is the engine behind **Gradient Descent** and backpropagation).\n3. **Probability & Statistics**: Conditional probability (Bayes' Theorem), normal distributions, variance, and hypothesis testing.\n\n📚 *Best Free Resource:* Watch 3Blue1Brown's YouTube series (*Essence of Linear Algebra* & *Essence of Calculus*) followed by Khan Academy's Statistics track.";

        // 7. Generative AI, LLMs, RAG, and Agents
        if (lower.includes("genai") || lower.includes("llm") || lower.includes("rag") || lower.includes("langchain") || lower.includes("agent") || lower.includes("prompt")) {
          return "✨ **Mastering Generative AI & RAG in 2026:**\n\nGenerative AI is currently the fastest-hiring specialization. Here is your roadmap:\n1. **Prompt Engineering & API Calling**: Learn structured prompting, few-shot examples, and tool calling with Anthropic (`Claude`) or OpenAI SDKs.\n2. **RAG (Retrieval-Augmented Generation)**: Build systems that connect LLMs to private data using **Embeddings**, **Vector Databases** (`ChromaDB`, `FAISS`, `Pinecone`), and semantic search.\n3. **Agentic AI & Multi-Agent Frameworks**: Teach LLMs to autonomously plan, search the web, execute Python code, and query SQL databases using `LangGraph` or `CrewAI`.\n4. **Fine-Tuning & Quantization**: Learn how to adapt open-source models (`Llama-3`) using **QLoRA** on consumer GPUs.";

        // 9. Telangana Colleges (IIT/IIIT Hyderabad, NIT Warangal, CBIT, VNR, MGIT, etc.)
        if (lower.includes("college") || lower.includes("cbit") || lower.includes("vnr") || lower.includes("mgit") || lower.includes("cvr") || lower.includes("anurag") || lower.includes("iit") || lower.includes("iiit") || lower.includes("nit") || lower.includes("eapcet")) {
          return "🏛️ **Telangana Colleges & AI Career Strategy:**\n\nWhether you are studying at **IIT/IIIT Hyderabad**, **NIT Warangal**, top autonomous private colleges (**CBIT, VNR VJIET, Vasavi, MGIT, GRIET, CVR, Anurag**), or regional engineering institutions across Telangana:\n\n• **In Tier S/A Colleges**: Take full advantage of campus placement loops, coding clubs, and research faculty.\n• **In Tier B/C Colleges**: Your college brand does **not** limit you if you build a high-impact public portfolio! Focus on:\n  1. Participating in open-source GitHub contributions & Kaggle competitions.\n  2. Applying to off-campus drives at product startups and GCCs in Hyderabad (`Gachibowli`, `HITEC City`).\n  3. Networking directly on LinkedIn by showcasing your deployed RAG/ML apps.\n\nYour skills, GitHub commits, and problem-solving mindset matter far more than your initial EAPCET rank!";
        }

        // 10. Placements, Salary, GCCs vs IT Services
        if (lower.includes("salary") || lower.includes("package") || lower.includes("placement") || lower.includes("lpa") || lower.includes("tcs") || lower.includes("gcc")) {
          return "💰 **Indian AI Placements & Compensation Reality Check:**\n\n• **IT Services / Mass Recruiters (`₹4.5L – ₹7.5L LPA`)**: TCS, Infosys, Wipro, and Cognizant typically recruit freshers into general system roles. Transitioning internally to core AI/ML takes 1–2 years.\n• **Global Capability Centers (GCCs) & Tech Startups (`₹12L – ₹24L+ LPA`)**: Companies in Hyderabad and Bengaluru (JPMorgan, Qualcomm, Walmart, Swiggy, AI-native startups) pay significant premiums for candidates who can build and deploy real ML/GenAI pipelines.\n• **Frontier Product Labs (`₹25L – ₹45L+ LPA`)**: Google, Microsoft, NVIDIA, and OpenAI require elite DSA mastery combined with deep systems and ML research foundations.\n\nTo break into the ₹12L+ tier as a fresher, focus heavily on **Station DP (Deployment)** and **Station PL (Placement Ready)**!";
        }

        // 11. Study Timetable & Daily Routine
        if (lower.includes("timetable") || lower.includes("schedule") || lower.includes("routine") || lower.includes("how many hours") || lower.includes("time")) {
          return "⏱️ **Recommended 15-Hour Weekly Study Routine for AI Aspirants:**\n\nConsistency beats cramming. Split your weekly hours across 3 buckets:\n\n• **Mon – Fri (1.5 hours/day)**:\n  - *45 mins*: Python / DSA problem solving (LeetCode / coding practice).\n  - *45 mins*: Core ML theory / maths / watching tutorial lectures.\n• **Sat – Sun (4 hours/day)**:\n  - *Dedicated Project Building*: Writing clean code, training models, debugging Docker/FastAPI pipelines, and writing detailed GitHub READMEs.\n\nStick to this routine for 6 months, and you will finish all 8 stations on the Roadmap and be 100% placement-ready!";
        }

        // Default Adaptive Catch-All
        return `🎯 **Great question on "${q.slice(0, 40)}${q.length > 40 ? '...' : ''}"!**\n\nTo master this topic effectively, here is your practical 3-step action plan:\n1. **Core Concept Mastery**: Connect this topic directly to **Station ${lower.includes('genai') || lower.includes('prompt') ? 'GA (Generative AI)' : lower.includes('data') || lower.includes('pandas') ? 'DA (Data Analysis)' : lower.includes('model') || lower.includes('train') ? 'ML (Machine Learning)' : 'DL (Deep Learning)'}** on your Roadmap.\n2. **Hands-On Implementation**: Open a Python virtual environment (` + "`venv`" + `) and test small modular scripts on public datasets from Kaggle or Hugging Face.\n3. **Production Polish**: Always wrap your final code inside a modular function or clean API (` + "`FastAPI`" + `) so you can showcase it right inside your GitHub portfolio.\n\nDo you want me to give you a specific code snippet or project walkthrough for this topic?`;
      };

      const send = async (text) => {
        const content = text ?? input;
        if (!content.trim() || loading) return;
        const newMessages = [...messages, { role: "user", content }];
        setMessages(newMessages);
        setInput("");
        setLoading(true);
        onUserQuestion();

        if (!apiKey.trim()) {
          // Simulated instant guidance for GitHub Pages without secret key
          await new Promise((r) => setTimeout(r, 1000));
          const reply = simulateMentorResponse(content);
          setMessages((m) => [...m, { role: "assistant", content: reply }]);
          setLoading(false);
          return;
        }

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey.trim(),
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
              model: "claude-3-5-sonnet-20241022",
              max_tokens: 800,
              system: MENTOR_SYSTEM_PROMPT,
              messages: newMessages.map((m) => ({ role: m.role, content: m.content })),
            }),
          });
          if (!response.ok) {
            throw new Error(`API error ${response.status}`);
          }
          const data = await response.json();
          const textBlock = data?.content?.find((b) => b.type === "text");
          const reply = textBlock?.text || "Sorry, I couldn't quite get that — try asking again?";
          setMessages((m) => [...m, { role: "assistant", content: reply }]);
        } catch (err) {
          console.warn("Live API call failed, falling back to simulated response:", err);
          await new Promise((r) => setTimeout(r, 600));
          const fallback = simulateMentorResponse(content);
          setMessages((m) => [...m, { role: "assistant", content: `[Offline/Demo Mode]: ${fallback}` }]);
        } finally {
          setLoading(false);
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      };

      return (
        <div className="max-w-3xl w-full mx-auto px-6 flex-1 flex flex-col" style={{ minHeight: "calc(100vh - 64px)" }}>
          <div className="py-6 flex items-center justify-between border-b border-[#1E232B]">
            <div>
              <div className="flex items-center gap-2 mb-1">
                <MessageCircleQuestion size={20} color="#F2A93B" />
                <h1 style={{ fontFamily: "'Space Grotesk', sans-serif" }} className="text-2xl font-semibold text-white">
                  AI Mentor
                </h1>
              </div>
              <p className="text-sm" style={{ color: "#8B93A1" }}>
                Ask without hesitation. That's the whole point of having a 24/7 AI tutor.
              </p>
            </div>
            <button
              onClick={() => setShowConfig(!showConfig)}
              className="text-xs px-3 py-1.5 rounded-lg bg-[#161B22] border border-[#1E232B] text-[#9AA3AF] hover:text-white transition-colors flex items-center gap-1.5"
            >
              <span>⚙️ {apiKey ? "API Connected" : "Custom API Key (Optional)"}</span>
            </button>
          </div>

          {showConfig && (
            <div className="mt-4 p-4 rounded-xl bg-[#12161D] border border-[#1E232B] text-xs space-y-2.5 shadow-md">
              <div className="flex items-center justify-between">
                <p className="font-semibold text-white">Connect Personal Claude API Key (Optional)</p>
                <span className="text-[10px] px-2 py-0.5 rounded bg-[#2DD4BF]/20 text-[#2DD4BF] font-mono">100% FREE BY DEFAULT</span>
              </div>
              <p className="text-[#8B93A1] leading-relaxed">
                **You do NOT need an API key!** Your AI Mentor is running right now with our **Instant Local Knowledge Engine**, giving detailed guidance across 50+ topics for free. If you happen to have a personal Claude API key (`sk-ant-...`) and want custom cloud inference, paste it below:
              </p>
              <input
                type="password"
                value={apiKey}
                onChange={(e) => setApiKey(e.target.value)}
                placeholder="Paste optional sk-ant-api03-... key here"
                className="w-full px-3 py-2 rounded bg-[#0C0F14] border border-[#1E232B] text-white font-mono text-xs focus:outline-none focus:border-[#F2A93B]"
              />
            </div>
          )}

          <div className="flex-1 space-y-4 py-6 overflow-y-auto">
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"}`}>
                <div
                  className="max-w-[85%] rounded-2xl px-5 py-3.5 text-sm leading-relaxed whitespace-pre-wrap shadow-md"
                  style={
                    m.role === "user"
                      ? { background: "#F2A93B", color: "#0C0F14", fontWeight: 500 }

                        className="text-[10px] tracking-widest font-bold"
                        style={{ fontFamily: "'JetBrains Mono', monospace", color: "#2DD4BF" }}
                      >
                        MENTOR {apiKey ? "(CLOUD CLAUDE API)" : "(INSTANT LOCAL ENGINE)"}
                      </span>
                    </div>
                  )}
                  {m.content}
                </div>
              </div>

            {loading && (
              <div className="flex justify-start">
                <div className="rounded-2xl px-5 py-3.5 flex items-center gap-2.5 shadow-sm" style={{ background: "#12161D", border: "1px solid #1E232B" }}>
                  <Loader2 size={15} color="#2DD4BF" className="animate-spin" />
                  <span className="text-xs" style={{ color: "#8B93A1" }}>
                    Mentor is analyzing your question...
                  </span>
                </div>
              </div>
            )}
            <div ref={scrollRef} />

          {messages.length === 1 && (

                  style={{ border: "1px solid #1E232B", color: "#9AA3AF" }}

    /* ============================== ROOT APP ============================== */
    const BADGE_DEFS = [
      { name: "First Steps", desc: "Complete your first roadmap task", icon: Star, check: (m) => m.tasksDone >= 1 },
      { name: "7-Day Streak", desc: "Show up 7 days in a row", icon: Flame, check: (m) => m.streak >= 7 },
      { name: "Mentor Regular", desc: "Ask the AI Mentor 10 questions", icon: MessageSquare, check: (m) => m.mentorQ >= 10 },
      { name: "Interview Ready", desc: "Send 5 answers in a mock interview", icon: Trophy, check: (m) => m.interviewTurns >= 5 },
      { name: "Roadmap Complete", desc: "Finish all 24 roadmap tasks", icon: Award, check: (m) => m.tasksDone >= ROADMAP_TOTAL_TASKS },
      { name: "30-Day Streak", desc: "Show up 30 days in a row", icon: Flame, check: (m) => m.streak >= 30 },
      { name: "Community Helper", desc: "Post or upvote 5 times in Community", icon: ArrowUp, check: (m) => m.posts + m.upvotesGiven >= 5 },
      { name: "Project Shipper", desc: "Share 3 posts in Community", icon: Star, check: (m) => m.posts >= 3 },
    ];

    function App() {
      const [page, setPage] = useState("home");

      const [mentorQCount, setMentorQCount] = usePersisted("mentor-question-count", 0);
      const [interviewTurnCount, setInterviewTurnCount] = usePersisted("interview-turn-count", 0);
      const [extraPosts, setExtraPosts] = usePersisted("community-posts", []);
      const [upvotes, setUpvotes] = usePersisted("community-upvotes", {});
      const [streakData, setStreakData, streakLoaded] = usePersisted("streak-data", { lastVisit: null, count: 0 });
      const [userAuth, setUserAuth] = usePersisted("user-auth", { isLoggedIn: false, name: "", email: "", college: "", branch: "" });
      const [authOpen, setAuthOpen] = useState(false);

      const streakInitRef = useRef(false);
      useEffect(() => {
        if (!streakLoaded || streakInitRef.current) return;
        streakInitRef.current = true;
        const today = todayStr();
        if (streakData.lastVisit === today) return;

        let nextCount = 1;
        if (streakData.lastVisit) {
          const gap = daysBetween(streakData.lastVisit, today);
          nextCount = gap === 1 ? streakData.count + 1 : 1;
        }
        setStreakData({ lastVisit: today, count: nextCount });
      }, [streakLoaded, streakData, setStreakData]);

      const tasksDone = useMemo(() => Object.values(roadmapDone).filter(Boolean).length, [roadmapDone]);
      const skillsChecked = useMemo(() => Object.values(skillHave).filter(Boolean).length, [skillHave]);
      const postsCreated = extraPosts.length;
      const upvotesGiven = useMemo(() => Object.values(upvotes).filter(Boolean).length, [upvotes]);
      const streak = streakData.count || 1;
      const xp = tasksDone * 10 + skillsChecked * 5 + mentorQCount * 8 + interviewTurnCount * 15 + postsCreated * 10 + upvotesGiven * 2;

      const metrics = {
        tasksDone,
        streak,
        mentorQ: mentorQCount,
        interviewTurns: interviewTurnCount,
        posts: postsCreated,
        upvotesGiven,
      };

      const badges = BADGE_DEFS.map((b) => ({ ...b, earned: b.check(metrics) }));
      const roadmapPct = Math.round((tasksDone / ROADMAP_TOTAL_TASKS) * 100);

      const addPost = useCallback((p) => setExtraPosts((prev) => [p, ...prev]), [setExtraPosts]);
      const addUpvote = useCallback((id) => setUpvotes((prev) => (prev[id] ? prev : { ...prev, [id]: true })), [setUpvotes]);
      const onUserQuestion = useCallback(() => setMentorQCount((c) => c + 1), [setMentorQCount]);
      const onUserTurn = useCallback(() => setInterviewTurnCount((c) => c + 1), [setInterviewTurnCount]);

            {page === "colleges" && <CollegesPage />}
            {page === "placements" && <PlacementsPage />}
            {page === "dashboard" && <DashboardPage skillHave={skillHave} setSkillHave={setSkillHave} />}
            {page === "interview" && <InterviewPrepPage onUserTurn={onUserTurn} />}
