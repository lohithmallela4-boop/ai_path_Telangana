    /* ============================== PERSISTENCE HOOK (FIXED & CLEAN) ============================== */
    function usePersisted(key, initial) {
      const [value, setValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initial;
        } catch (e) {
          return initial;
        }
      });
      const [loaded] = useState(true);

      useEffect(() => {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {
          console.error("Storage save failed for", key, e);
        }
      }, [key, value]);

      return [value, setValue, loaded];
    }

    /* SMART AI INTERVIEWER WITH FALLBACK & API KEY CONFIG */
    function AiInterviewer({ onUserTurn }) {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [apiKey, setApiKey] = usePersisted("anthropic-api-key", "");
      const [showConfig, setShowConfig] = useState(false);
      const scrollRef = useRef(null);

      useEffect(() => {
        scrollRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, loading]);

      const SYSTEM_PROMPT = `You are conducting a mock technical interview for an AI/ML engineering role, for a student in Telangana, India preparing for placements. Ask one interview question at a time (mix of coding, ML concepts, system design, behavioral). Wait for their answer, then give brief honest feedback (what was good, what to improve) before asking the next question. Keep the tone encouraging but honest — don't inflate weak answers. Keep each message reasonably short.`;

      const simulateAIResponse = (userText, historyLen) => {
        const responses = [
          "Good start! You mentioned the core idea clearly. For your next question: Can you explain how you would detect and handle overfitting when training a Deep Neural Network on a tabular dataset?",
          "Solid answer. To improve, you could explicitly mention quantifiable metrics or time complexity tradeoffs. Next scenario: If your production RAG pipeline is returning hallucinations on 15% of queries, how would you systematically debug and fix it?",
          "Spot on intuition! That shows real applied engineering judgment. Let's pivot to system design: How would you structure the deployment pipeline to update an ML model weekly without causing downtime for live users?",
          "Well explained! You broke down the bias-variance trade-off nicely. Finally, a behavioral question: Tell me about a time you had to learn a complex new ML framework or library under a very tight deadline. How did you approach it?"
        ];
        return responses[historyLen % responses.length] || "Thank you for sharing your approach! That wraps up our quick practice loop today. Be sure to check the Question Bank on the left for more detailed model answers!";
      };

      const callApi = async (msgs) => {
        if (!apiKey.trim()) {
          // Offline / Demo Fallback for Static GitHub Pages deployment
          await new Promise((r) => setTimeout(r, 1200));
          const lastUserMsg = msgs[msgs.length - 1].content;
          if (lastUserMsg.includes("ready to start")) {
            return "Hello! I am your AI Interviewer. Let's start with a foundational question: Can you explain the difference between supervised learning and unsupervised learning, and give one practical example where you would use each?";
          }
          return simulateAIResponse(lastUserMsg, msgs.length);
        }

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey.trim(),
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
              model: "claude-3-5-sonnet-20241022",
              max_tokens: 800,
              system: SYSTEM_PROMPT,
              messages: msgs.map((m) => ({ role: m.role, content: m.content })),
            }),
          });
          if (!response.ok) {
            throw new Error(`API returned ${response.status}`);
          }
          const data = await response.json();
          return data.content?.map((b) => b.text || "").join("\n") || "Sorry, something went wrong.";
        } catch (e) {
          console.warn("Direct API call failed, falling back to simulated interview response:", e);
          await new Promise((r) => setTimeout(r, 800));
          const lastUserMsg = msgs[msgs.length - 1].content;
          return `[Offline/Demo Mode]: ${simulateAIResponse(lastUserMsg, msgs.length)}`;
        }
      };

      const send = async () => {
        if (!input.trim() || loading) return;
        const newMessages = [...messages, { role: "user", content: input }];
        setMessages(newMessages);
        setInput("");
        setLoading(true);
        onUserTurn();
        try {
          const text = await callApi(newMessages);
          setMessages((m) => [...m, { role: "assistant", content: text }]);
        } catch (e) {
          setMessages((m) => [...m, { role: "assistant", content: "Connection error — please check network." }]);
        } finally {
          setLoading(false);
        }
      };

      const start = async () => {
        const first = [{ role: "user", content: "I'm ready to start the mock interview." }];
        setMessages(first);
        setLoading(true);
        onUserTurn();
        try {
          const text = await callApi(first);
          setMessages((m) => [...m, { role: "assistant", content: text }]);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div>
          <div className="flex items-center justify-between mb-6">
            <div className="flex items-center gap-2">
              <Bot size={16} color="#2DD4BF" />
              <span className="text-xs font-semibold tracking-wider" style={{ fontFamily: "'JetBrains Mono', monospace", color: "#2DD4BF" }}>
                AI INTERVIEWER {apiKey ? "(LIVE CLAUDE)" : "(DEMO MODE)"}
              </span>
            </div>
            <button
              onClick={() => setShowConfig(!showConfig)}
              className="text-[11px] px-2.5 py-1 rounded bg-[#161B22] border border-[#1E232B] text-[#9AA3AF] hover:text-white transition-colors"
            >
              {showConfig ? "Close Config" : "⚙️ API Key"}
            </button>
          </div>

          {showConfig && (
            <div className="mb-4 p-4 rounded-xl bg-[#0C0F14] border border-[#1E232B] text-xs space-y-2">
              <p className="font-semibold text-white">Live Claude API Key (Optional for GitHub Pages)</p>
              <p className="text-[#8B93A1]">
                Leave empty to use instant built-in demo questions, or enter your Anthropic API Key to conduct live adaptive interviews right from your browser.
              </p>
              <input
                type="password"
                value={apiKey}
                onChange={(e) => setApiKey(e.target.value)}
                placeholder="sk-ant-api03-..."
                className="w-full px-3 py-2 rounded bg-[#12161D] border border-[#1E232B] text-white font-mono text-xs focus:outline-none focus:border-[#F2A93B]"
              />
            </div>
          )}

          {messages.length === 0 ? (
            <div className="rounded-xl p-8 text-center shadow-inner" style={{ background: "#0C0F14", border: "1px solid #1E232B" }}>
              <p className="text-sm mb-5" style={{ color: "#9AA3AF" }}>
                Get asked real technical & behavioral questions, one at a time, with constructive feedback after every answer.
              </p>
              <button
                onClick={start}
                className="px-6 py-3 rounded-lg text-sm font-medium transition-all hover:scale-105 shadow-md active:scale-95"
                style={{ background: "#F2A93B", color: "#0C0F14" }}
              >
                Start Mock Interview
              </button>
            </div>
          ) : (
            <div className="rounded-xl flex flex-col shadow-inner" style={{ background: "#0C0F14", border: "1px solid #1E232B", height: "420px" }}>
              <div className="flex-1 overflow-y-auto p-4 space-y-3.5">
                {messages.map((m, i) => (
                  <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"}`}>
                    <div
                      className="max-w-[85%] rounded-xl px-4 py-3 text-sm leading-relaxed shadow-sm whitespace-pre-wrap"
                      style={{
                        background: m.role === "user" ? "#F2A93B" : "#12161D",
                        color: m.role === "user" ? "#0C0F14" : "#F3F1EA",
                        border: m.role === "user" ? "none" : "1px solid #1E232B"
                      }}
                    >
                      {m.content}
                    </div>
                  </div>
                ))}
                {loading && (
                  <div className="flex items-center gap-2 text-xs pl-2" style={{ color: "#5B6472" }}>
                    <Loader2 size={14} className="animate-spin text-[#2DD4BF]" />
                    <span>interviewer is thinking...</span>
                  </div>
                )}
                <div ref={scrollRef} />
              </div>

              <div className="flex items-center gap-2 p-3 border-t bg-[#12161D]/50" style={{ borderColor: "#1E232B" }}>
                <textarea
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                      e.preventDefault();
                      send();
                    }
                  }}
                  placeholder="Type your answer here..."
                  rows={1}
                  className="flex-1 bg-transparent outline-none text-sm resize-none text-white placeholder-[#5B6472]"
                />
                <button
                  onClick={send}
                  disabled={loading || !input.trim()}
                  className="p-2.5 rounded-lg shrink-0 transition-all hover:scale-105 active:scale-95 disabled:opacity-40"
                  style={{ background: "#F2A93B" }}
                >
                  <Send size={15} color="#0C0F14" />
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function MentorPage({ onUserQuestion }) {
      const [messages, setMessages] = useState([

          role: "assistant",
          content: "Hey! I'm your AI Mentor. Ask me anything about your learning roadmap, an AI concept you're stuck on, resume reviews, or placement interviews — no question is too basic.",
        },
      ]);

      const scrollRef = useRef(null);

      useEffect(() => {
        scrollRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, loading]);

      const simulateMentorResponse = (q) => {
        const lower = q.toLowerCase();
        if (lower.includes("1st year") || lower.includes("learn first") || lower.includes("start")) {
          return "Welcome! Since you're starting out, follow this exact sequence:\n\n1. **Python Fundamentals**: Master loops, functions, lists, dictionaries, and virtual environments (`venv`). Do Harvard's free CS50P.\n2. **Linear Algebra & Probability**: Just enough to understand how matrices and probabilities represent data (Khan Academy or 3Blue1Brown).\n3. **Data Analysis**: Learn Pandas & NumPy to manipulate CSVs.\n\nDon't jump straight into ChatGPT APIs right now — building strong core Python and data fundamentals first will make you 10x faster when you get to Machine Learning next semester!";
        }
        if (lower.includes("difference between ml and deep learning") || lower.includes("deep learning")) {
          return "Great question! Think of it like a set of nested circles:\n\n• **Artificial Intelligence (AI)** is the broad goal: making computers perform intelligent tasks.\n• **Machine Learning (ML)** is the method: instead of writing explicit `if-else` rules, we give algorithms labeled data and let them learn statistical patterns (like predicting house prices using Scikit-Learn).\n• **Deep Learning (DL)** is a specialized sub-field of ML using multi-layered **Neural Networks** inspired by the human brain. DL is what powers modern Computer Vision, Voice Recognition, and Large Language Models like Claude because neural networks scale remarkably well with massive data and GPUs.";
        }
        if (lower.includes("resume screener") || lower.includes("project idea")) {
          return "A **Resume Screener with NLP** is a fantastic intermediate portfolio project! Here is how to make it stand out to tech recruiters:\n\n1. **Use Modern Embeddings**: Instead of old TF-IDF keyword counting, use open-source sentence embeddings (like `all-MiniLM-L6-v2` from Hugging Face) to compute cosine similarity between a candidate's resume and the job description.\n2. **Add a UI**: Build a clean 3-page web interface using Streamlit or FastAPI + React.\n3. **Explain Trade-offs**: In your README, explain why semantic search works better than exact keyword matching for synonyms (e.g. recognizing 'ML' and 'Machine Learning' as identical).\n\nIf you deploy this live on Hugging Face Spaces or Render, it will definitely catch a recruiter's eye!";
        }
        if (lower.includes("day to day") || lower.includes("actually do")) {
          return "An **AI Engineer's day-to-day** in 2026 typically looks like this:\n\n• **30% Data & Pipeline Work**: Cleaning messy datasets, formatting inputs, and setting up data retrieval pipelines (RAG vector searches).\n• **30% Model Evaluation & Fine-Tuning**: Testing different open or closed models (Claude, Llama, Mistral), writing robust evaluation benchmarks, and optimizing prompts or fine-tuning weights.\n• **30% Deployment & Software Engineering**: Writing FastAPI endpoints, wrapping models in Docker containers, managing latency, and monitoring API cost & token budgets.\n• **10% Collaboration**: Explaining capabilities and limits to product managers or designers.\n\nIt's a wonderful blend of software engineering and applied scientific problem-solving!";
        }
        return "That is a great focus area! To master this, I recommend checking Station **GA (Generative AI)** and Station **DP (Deployment)** on your Roadmap. Always tie what you learn back to a deployed project you can showcase on GitHub. What specific part of this topic would you like to dive deeper into?";
      };

      const send = async (text) => {
        const content = text ?? input;
        if (!content.trim() || loading) return;
        const newMessages = [...messages, { role: "user", content }];
        setMessages(newMessages);
        setInput("");
        setLoading(true);
        onUserQuestion();

        if (!apiKey.trim()) {
          // Simulated instant guidance for GitHub Pages without secret key
          await new Promise((r) => setTimeout(r, 1000));
          const reply = simulateMentorResponse(content);
          setMessages((m) => [...m, { role: "assistant", content: reply }]);
          setLoading(false);
          return;
        }

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey.trim(),
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
              model: "claude-3-5-sonnet-20241022",
              max_tokens: 800,
              system: MENTOR_SYSTEM_PROMPT,
              messages: newMessages.map((m) => ({ role: m.role, content: m.content })),
            }),
          });
          if (!response.ok) {
            throw new Error(`API error ${response.status}`);
          }
          const data = await response.json();
          const textBlock = data?.content?.find((b) => b.type === "text");
          const reply = textBlock?.text || "Sorry, I couldn't quite get that — try asking again?";
          setMessages((m) => [...m, { role: "assistant", content: reply }]);
        } catch (err) {
          console.warn("Live API call failed, falling back to simulated response:", err);
          await new Promise((r) => setTimeout(r, 600));
          const fallback = simulateMentorResponse(content);
          setMessages((m) => [...m, { role: "assistant", content: `[Offline/Demo Mode]: ${fallback}` }]);
        } finally {
          setLoading(false);
        }

          send();
        }

        <div className="max-w-3xl w-full mx-auto px-6 flex-1 flex flex-col" style={{ minHeight: "calc(100vh - 64px)" }}>
          <div className="py-6 flex items-center justify-between border-b border-[#1E232B]">

              </p>
            </div>
            <button

              className="text-xs px-3 py-1.5 rounded-lg bg-[#161B22] border border-[#1E232B] text-[#9AA3AF] hover:text-white transition-colors flex items-center gap-1.5"
            >
              <span>⚙️ {apiKey ? "Connected" : "API Config"}</span>
            </button>
          </div>

          {showConfig && (
            <div className="mt-4 p-4 rounded-xl bg-[#12161D] border border-[#1E232B] text-xs space-y-2">
              <p className="font-semibold text-white">Configure Anthropic Claude API Key (Optional)</p>
              <p className="text-[#8B93A1]">
                By default, this static GitHub Pages app runs in <b>Instant Demo Mode</b> with pre-calibrated answers. If you want live, unlimited Claude intelligence directly from your browser, enter your Anthropic key below (saved locally in your browser storage only):
              </p>
              <input
                type="password"
                value={apiKey}
                onChange={(e) => setApiKey(e.target.value)}
                placeholder="sk-ant-api03-..."
                className="w-full px-3 py-2 rounded bg-[#0C0F14] border border-[#1E232B] text-white font-mono text-xs focus:outline-none focus:border-[#F2A93B]"
              />
            </div>
          )}

          <div className="flex-1 space-y-4 py-6 overflow-y-auto">
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"}`}>
                <div
                  className="max-w-[85%] rounded-2xl px-5 py-3.5 text-sm leading-relaxed whitespace-pre-wrap shadow-md"
                  style={
                    m.role === "user"
                      ? { background: "#F2A93B", color: "#0C0F14", fontWeight: 500 }
                      : { background: "#12161D", border: "1px solid #1E232B", color: "#F3F1EA" }
                  }
                >
                  {m.role === "assistant" && (
                    <div className="flex items-center gap-1.5 mb-2">
                      <Sparkles size={13} color="#2DD4BF" />
                      <span
                        className="text-[10px] tracking-widest font-bold"

            {loading && (
              <div className="flex justify-start">

      const [extraPosts, setExtraPosts] = usePersisted("community-posts", []);
      const [upvotes, setUpvotes] = usePersisted("community-upvotes", {});
      const [streakData, setStreakData, streakLoaded] = usePersisted("streak-data", { lastVisit: null, count: 0 });

      const streakInitRef = useRef(false);
      useEffect(() => {
        if (!streakLoaded || streakInitRef.current) return;
        streakInitRef.current = true;
        const today = todayStr();
        if (streakData.lastVisit === today) return;

        let nextCount = 1;
        if (streakData.lastVisit) {
          const gap = daysBetween(streakData.lastVisit, today);
          nextCount = gap === 1 ? streakData.count + 1 : 1;
        }
        setStreakData({ lastVisit: today, count: nextCount });
      }, [streakLoaded, streakData, setStreakData]);

      const tasksDone = useMemo(() => Object.values(roadmapDone).filter(Boolean).length, [roadmapDone]);
      const skillsChecked = useMemo(() => Object.values(skillHave).filter(Boolean).length, [skillHave]);
      const postsCreated = extraPosts.length;
      const upvotesGiven = useMemo(() => Object.values(upvotes).filter(Boolean).length, [upvotes]);
      const streak = streakData.count || 1;
      const xp = tasksDone * 10 + skillsChecked * 5 + mentorQCount * 8 + interviewTurnCount * 15 + postsCreated * 10 + upvotesGiven * 2;

      const metrics = {
        tasksDone,
        streak,
        mentorQ: mentorQCount,
        interviewTurns: interviewTurnCount,
        posts: postsCreated,
        upvotesGiven,
      };

      const badges = BADGE_DEFS.map((b) => ({ ...b, earned: b.check(metrics) }));
      const roadmapPct = Math.round((tasksDone / ROADMAP_TOTAL_TASKS) * 100);

      const addPost = useCallback((p) => setExtraPosts((prev) => [p, ...prev]), [setExtraPosts]);
      const addUpvote = useCallback((id) => setUpvotes((prev) => (prev[id] ? prev : { ...prev, [id]: true })), [setUpvotes]);
      const onUserQuestion = useCallback(() => setMentorQCount((c) => c + 1), [setMentorQCount]);
      const onUserTurn = useCallback(() => setInterviewTurnCount((c) => c + 1), [setInterviewTurnCount]);

      // Scroll to top on page change
      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, [page]);

      return (
        <div className="min-h-screen w-full flex flex-col bg-[#0C0F14] text-[#F3F1EA] font-sans selection:bg-[#F2A93B] selection:text-[#0C0F14]">
          <TopNav page={page} setPage={setPage} xp={xp} streak={streak} />
          <main className="flex-1 flex flex-col">
            {page === "home" && <LandingPage setPage={setPage} roadmapPct={roadmapPct} />}
            {page === "roadmap" && <RoadmapPage done={roadmapDone} setDone={setRoadmapDone} />}
            {page === "companies" && <CompaniesPage />}
            {page === "colleges" && <CollegesPage />}
            {page === "placements" && <PlacementsPage />}
            {page === "dashboard" && <DashboardPage skillHave={skillHave} setSkillHave={setSkillHave} />}
            {page === "interview" && <InterviewPrepPage onUserTurn={onUserTurn} />}
            {page === "community" && <CommunityPage extraPosts={extraPosts} addPost={addPost} upvotes={upvotes} addUpvote={addUpvote} xp={xp} streak={streak} badges={badges} />}
            {page === "mentor" && <MentorPage onUserQuestion={onUserQuestion} />}
          </main>
        </div>
      );
    }

    // Render application
    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
